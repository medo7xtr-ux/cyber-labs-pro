<!-- test_frontend.html -->
<html><body>
<button onclick="testAPI()">اختبار API</button>
<div id="result"></div>
<script>
async function testAPI() {
    try {
        const response = await fetch('http://localhost:8000/api/labs/labs/');
        const data = await response.json();
        document.getElementById('result').innerHTML = 
            `✅ تم تحميل ${data.count} معمل`;
    } catch (error) {
        document.getElementById('result').innerHTML = 
            `❌ خطأ: ${error.message}`;
    }
}
</script>
</body></html>
